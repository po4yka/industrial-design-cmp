name: Bug report
description: Report a defect in a component, token, or theme.
title: "[bug] "
labels: ["bug", "needs-triage"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What is the incorrect behavior?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      description: Minimal code or steps that demonstrate the defect.
      render: kotlin
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: library-version
    attributes:
      label: industrial-design-cmp version
      placeholder: 0.1.0
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      multiple: true
      options:
        - Android
        - iOS
        - Both
    validations:
      required: true
  - type: input
    id: compose-version
    attributes:
      label: Compose Multiplatform version
      placeholder: 1.10.3
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: Drag dark + light screenshots here if visual.
