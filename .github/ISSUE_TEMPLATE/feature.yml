name: Feature request
description: Propose a new component, token, or capability.
title: "[feature] "
labels: ["enhancement", "needs-triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve? Who is affected?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Sketch the API or behavior. Link an RFC if you have one.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: textarea
    id: design-fit
    attributes:
      label: Design fit
      description: How does this match the industrial aesthetic — no shadows, no spring, flat surfaces, typographic hierarchy? Read skill/SKILL.md first.
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I searched existing issues and RFCs.
          required: true
        - label: This does not introduce shadows, gradients, or spring easing.
          required: true
