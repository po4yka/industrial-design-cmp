name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v6

      - name: Assemble library
        run: ./gradlew :library:assemble :library:compileKotlinMetadata --stacktrace --no-daemon

      - name: Assemble demo
        run: ./gradlew :demo:assemble --stacktrace --no-daemon

      - name: Run library tests
        run: ./gradlew :library:allTests --stacktrace --no-daemon

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: "**/build/test-results/**"
          if-no-files-found: ignore

  ios-check:
    runs-on: macos-14
    timeout-minutes: 60
    # macos-14's default is Xcode 15.4 (iOS 17.5 SDK), but Compose
    # Multiplatform 1.11.0's ui-uikit references `_OBJC_CLASS_$_UIViewLayoutRegion`
    # and auto-links the `UIUtilities` framework, both iOS 18+ only. The
    # cached skiko klib is likewise built against iOS-simulator 18.5. Pin
    # DEVELOPER_DIR to Xcode 16.2 (preinstalled on macos-14) so Kotlin/Native's
    # ld invocation sees the iOS 18 SDK.
    env:
      DEVELOPER_DIR: /Applications/Xcode_16.2.app/Contents/Developer

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v6

      - name: Link iOS simulator framework
        run: ./gradlew :library:linkDebugFrameworkIosSimulatorArm64 --stacktrace --no-daemon

      - name: Run iOS simulator tests
        run: ./gradlew :library:iosSimulatorArm64Test --stacktrace --no-daemon

  screenshot-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v6

      - name: Verify screenshots
        run: ./gradlew :screenshot-tests:verifyRoborazziDebug --stacktrace --no-daemon

      - name: Upload failure diffs
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: roborazzi-diffs
          path: screenshot-tests/build/outputs/roborazzi/
          if-no-files-found: ignore
