name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v6

      - name: Assemble library
        run: ./gradlew :library:assemble :library:compileKotlinMetadata --stacktrace --no-daemon

      - name: Assemble demo
        run: ./gradlew :demo:assemble --stacktrace --no-daemon

      - name: Run library tests
        run: ./gradlew :library:allTests --stacktrace --no-daemon

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: "**/build/test-results/**"
          if-no-files-found: ignore

  ios-check:
    runs-on: macos-15
    timeout-minutes: 60
    # Compose Multiplatform 1.11.0's ui-uikit references
    # `_OBJC_CLASS_$_UIViewLayoutRegion` and auto-links the `UIUtilities`
    # framework -- both introduced in **iOS 26**, not iOS 18 as a first
    # guess suggested. macos-14 only ships Xcode up to 16.2 (iOS 18.2 SDK)
    # so even pinning to its newest Xcode keeps the link failure. Move to
    # macos-15, which preinstalls Xcode 26.x (default is still 16.4 -- iOS
    # 18.5 SDK -- so DEVELOPER_DIR has to be set explicitly). Xcode 26.3
    # brings the iOS 26.2 SDK that defines `UIViewLayoutRegion` and
    # ships the `UIUtilities` framework.
    env:
      DEVELOPER_DIR: /Applications/Xcode_26.3.app/Contents/Developer

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v6

      - name: Link iOS simulator framework
        run: ./gradlew :library:linkDebugFrameworkIosSimulatorArm64 --stacktrace --no-daemon

      - name: Run iOS simulator tests
        run: ./gradlew :library:iosSimulatorArm64Test --stacktrace --no-daemon

  screenshot-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v6

      - name: Verify screenshots
        run: ./gradlew :screenshot-tests:verifyRoborazziDebug --stacktrace --no-daemon

      - name: Upload failure diffs
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: roborazzi-diffs
          path: screenshot-tests/build/outputs/roborazzi/
          if-no-files-found: ignore
